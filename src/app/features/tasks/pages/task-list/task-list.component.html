<section class="bg-white py-16">
  <div class="max-w-5xl mx-auto px-6 space-y-6">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-bold text-black">My Tasks</h2>

      <a
        routerLink="/tasks/add"
        class="bg-black text-white px-6 py-2 rounded-md hover:opacity-80 transition"
      >
        + Add Task
      </a>
    </div>

    @if (store.loading) {
      <div class="flex justify-center items-center py-16">
        <div
          class="w-8 h-8 border-4 border-black border-t-transparent rounded-full animate-spin"
        ></div>
      </div>
    } @else if (store.tasks.length === 0) {
      <div class="text-center py-16 border rounded-lg bg-gray-50">
        <h3 class="text-xl font-semibold text-gray-700">No Tasks Yet</h3>
        <p class="text-gray-500 mt-2">Click "+ Add Task" to create your first task.</p>
      </div>
    } @else {
      <div class="flex flex-col gap-4">
        @for (task of store.tasks; track task.id) {
          <app-task-card [task]="task"></app-task-card>
        }
      </div>
    }
  </div>
</section>
