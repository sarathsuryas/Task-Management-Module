<form
  class="space-y-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm"
  (ngSubmit)="submit()">
  <label class="block text-sm font-semibold text-slate-800">
    {{ parentId() ? 'Write a reply' : 'Add a comment' }}
  </label>

  <textarea
    name="commentText"
    class="block w-full resize-y rounded-lg border border-slate-300 bg-slate-50 px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
    [(ngModel)]="text"
    [placeholder]="parentId() ? 'Share your reply...' : 'Share your thoughts...'"
    rows="4">
  </textarea> 

  <div class="flex justify-end">
    <button
      type="submit"
      class="inline-flex items-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50"
      [disabled]="!text.trim()">
      {{ parentId() ? 'Post reply' : 'Post comment' }}
    </button>
  </div>
</form>
